# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - SocialFuse

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build React Frontend
        run: |
          cd frontend
          npm install
          npm run build
          python sync_frontend.py

      # 🛠️ Local Build Section (Optional)
      # The following section in your workflow is designed to catch build issues early on the client side, before deployment. This can be helpful for debugging and validation. However, if this step significantly increases deployment time and early detection is not critical for your workflow, you may remove this section to streamline the deployment process.
      - name: Create and Start virtual environment and Install dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt
                
      # By default, when you enable GitHub CI/CD integration through the Azure portal, the platform automatically sets the SCM_DO_BUILD_DURING_DEPLOYMENT application setting to true. This triggers the use of Oryx, a build engine that handles application compilation and dependency installation (e.g., pip install) directly on the platform during deployment. Hence, we exclude the antenv virtual environment directory from the deployment artifact to reduce the payload size. 
      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !antenv/

      # 🚫 Opting Out of Oryx Build
      # If you prefer to disable the Oryx build process during deployment, follow these steps:
      # 1. Remove the SCM_DO_BUILD_DURING_DEPLOYMENT app setting from your Azure App Service Environment variables.
      # 2. Refer to sample workflows for alternative deployment strategies: https://github.com/Azure/actions-workflow-samples/tree/master/AppService
      

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_DA566491C53B4F82B5C594FC31C2B393 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1EF6E69EE92F4F77BFA5D7B35D77EF19 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B9B3F14EF03F4032BDD64117DEB23A5D }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'SocialFuse'
          slot-name: 'Production'
          startup-command: 'python social_help/manage.py migrate --noinput && python social_help/manage.py collectstatic --noinput && gunicorn --bind=0.0.0.0:${PORT:-8000} --timeout 600 --chdir social_help social_help.wsgi:application'

      - name: Fetch Azure Web App Logs
        continue-on-error: true
        run: |
          cat << 'EOF' > fetch_logs.py
          import sys, json, requests, subprocess
          try:
              token = subprocess.check_output("az account get-access-token --resource https://management.azure.com/ --query accessToken -o tsv", shell=True, text=True).strip()
              headers = {"Authorization": f"Bearer {token}"}
          except Exception as e:
              print('Failed to get token:', e)
              sys.exit(0)
          
          url = "https://socialfuse-eybzczb3e8gcg0c2.scm.southeastasia-01.azurewebsites.net/api/vfs/LogFiles/StartupLogs/"
          try:
              r = requests.get(url, headers=headers, timeout=30)
              print('Status:', r.status_code)
              if r.status_code != 200:
                  print('Error content:', r.text)
                  sys.exit(0)
              
              files = r.json()
              file_names = [f['name'] for f in files]
              print('Files in StartupLogs:', file_names)
              
              failure_files = [n for n in file_names if "failure" in n]
              if failure_files:
                  latest_failure = sorted(failure_files)[-1]
                  print('Latest failure log:', latest_failure)
                  r_log = requests.get(url + latest_failure, headers=headers, timeout=30)
                  print('=== FAILURE LOG CONTENT ===')
                  print(r_log.text)
                  print('===========================')
              else:
                  print('No failure logs found.')
          except Exception as e:
              print('Request failed:', e)
              sys.exit(0)
          EOF
          python fetch_logs.py
