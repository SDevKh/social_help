services:
  - type: web
    name: social-help
    env: python
    rootDir: social_help
    buildCommand: bash build_files.sh
    startCommand: bash start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: social-help-db
          property: connectionString

databases:
  - name: social-help-db
    databaseName: social_help
    user: social_help
