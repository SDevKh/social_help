<!DOCTYPE html>
<html lang="en">
<head>
    <title>Sign Up</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #141327;
            --muted: #6c6b85;
            --brand: #2f3dbd;
            --brand-strong: #1f2aa3;
            --panel: #ffffff;
            --line: rgba(20, 19, 39, 0.12);
            --glow: rgba(88, 95, 255, 0.25);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Space Grotesk", "Segoe UI", sans-serif;
            background: radial-gradient(1200px 600px at 15% 15%, #dfe4ff 0%, #f6f7ff 38%, #f3f5ff 55%, #d6dcff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: var(--ink);
        }

        .auth-shell {
            width: min(980px, 100%);
            background: rgba(255, 255, 255, 0.75);
            border-radius: 28px;
            padding: 18px;
            box-shadow:
                0 40px 90px rgba(33, 43, 135, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        .auth-card {
            display: grid;
            grid-template-columns: minmax(280px, 1.05fr) minmax(260px, 0.95fr);
            gap: 18px;
            background: var(--panel);
            border-radius: 22px;
            overflow: hidden;
        }

        .auth-form {
            padding: 42px 40px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(47, 61, 189, 0.1);
            color: var(--brand);
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.2px;
            margin-bottom: 20px;
        }

        .auth-form h1 {
            font-size: clamp(26px, 3vw, 32px);
            margin-bottom: 8px;
        }

        .auth-form p {
            color: var(--muted);
            font-size: 15px;
            margin-bottom: 28px;
        }

        form {
            display: grid;
            gap: 16px;
        }

        .field label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap input,
        .input-wrap select,
        .input-wrap textarea {
            width: 100%;
            border: 1px solid var(--line);
            background: #f7f8ff;
            padding: 14px 16px;
            border-radius: 14px;
            font-size: 15px;
            color: var(--ink);
            outline: none;
            transition: border 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .input-wrap input:focus,
        .input-wrap select:focus,
        .input-wrap textarea:focus {
            border-color: var(--brand);
            background: #ffffff;
            box-shadow: 0 0 0 4px var(--glow);
        }

        .helptext {
            color: #8b8aa1;
            font-size: 12px;
            margin-top: 6px;
        }

        .errorlist {
            list-style: none;
            color: #b12a35;
            font-size: 12px;
            margin-top: 6px;
        }

        .primary-btn {
            border: none;
            background: linear-gradient(135deg, var(--brand) 0%, #4c5bff 100%);
            color: #fff;
            padding: 14px 18px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 14px 30px rgba(47, 61, 189, 0.3);
        }

        .primary-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 36px rgba(47, 61, 189, 0.35);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #8e8da5;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 8px 0 0;
        }

        .divider::before,
        .divider::after {
            content: "";
            height: 1px;
            flex: 1;
            background: rgba(20, 19, 39, 0.12);
        }

        .social-row {
            display: flex;
            gap: 10px;
        }

        .social-pill {
            flex: 1;
            border: 1px solid var(--line);
            background: #ffffff;
            padding: 10px 12px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: border 0.2s ease, transform 0.2s ease;
        }

        .social-pill:hover {
            border-color: var(--brand);
            transform: translateY(-1px);
        }

        .auth-footer {
            margin-top: 16px;
            text-align: center;
            font-size: 14px;
            color: var(--muted);
        }

        .auth-footer a {
            color: var(--brand);
            font-weight: 600;
            text-decoration: none;
        }

        .art-panel {
            position: relative;
            background: radial-gradient(120% 120% at 20% 20%, #5b6bff 0%, #2f3dbd 35%, #1b226f 70%, #0e0f3f 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 28px;
        }

        .art-panel::before,
        .art-panel::after {
            content: "";
            position: absolute;
            border-radius: 999px;
            filter: blur(0.5px);
            opacity: 0.9;
        }

        .art-panel::before {
            width: 220px;
            height: 220px;
            background: radial-gradient(circle at 30% 30%, #dfe5ff 0%, rgba(223, 229, 255, 0.2) 60%, rgba(223, 229, 255, 0) 70%);
            top: 20px;
            left: 30px;
        }

        .art-panel::after {
            width: 260px;
            height: 260px;
            background: radial-gradient(circle at 70% 70%, #8c96ff 0%, rgba(140, 150, 255, 0.2) 55%, rgba(140, 150, 255, 0) 72%);
            bottom: -20px;
            right: -10px;
        }

        .orb {
            width: 85%;
            aspect-ratio: 1 / 1;
            border-radius: 28px;
            background: radial-gradient(120% 120% at 10% 10%, #c9d2ff 0%, #6b78ff 35%, #2c3bd1 70%, #12174f 100%);
            box-shadow: inset 0 0 50px rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .orb::before {
            content: "";
            position: absolute;
            inset: -30% 30% 30% -30%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.7) 0%, rgba(255, 255, 255, 0.2) 45%, rgba(255, 255, 255, 0) 60%);
        }

        .orb::after {
            content: "";
            position: absolute;
            inset: 40% -20% -10% 10%;
            background: radial-gradient(circle at 65% 65%, rgba(255, 255, 255, 0.35) 0%, rgba(255, 255, 255, 0.08) 40%, rgba(255, 255, 255, 0) 60%);
        }

        @media (max-width: 860px) {
            .auth-card {
                grid-template-columns: 1fr;
            }

            .art-panel {
                min-height: 260px;
                border-radius: 0 0 22px 22px;
            }
        }

        @media (max-width: 540px) {
            .auth-form {
                padding: 32px 24px;
            }
        }
    </style>
</head>
<body>
    <main class="auth-shell">
        <section class="auth-card">
            <div class="auth-form">
                <span class="badge">New account</span>
                <h1>Welcome home</h1>
                <p>Please enter your details to create your account.</p>

                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="field">
                            <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                            <div class="input-wrap">
                                {{ field }}
                            </div>
                            {% if field.help_text %}
                                <div class="helptext">{{ field.help_text }}</div>
                            {% endif %}
                            {% if field.errors %}
                                {{ field.errors }}
                            {% endif %}
                        </div>
                    {% endfor %}
                    <button class="primary-btn" type="submit">Create account</button>
                    <div class="divider">or</div>
                    <div class="social-row">
                        <button class="social-pill" type="button">Google</button>
                    </div>
                </form>

                <div class="auth-footer">
                    Already have an account? <a href="/login/">Login</a>
                </div>
            </div>

            <div class="art-panel" aria-hidden="true">
                <div class="orb"></div>
            </div>
        </section>
    </main>
</body>
</html>
