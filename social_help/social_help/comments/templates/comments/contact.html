<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-LB3TPSKJ15"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-LB3TPSKJ15');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - SocialFuse</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Manrope', sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 40px 20px;
            background-color: #080b11;
            /* Subtle triadic background radial glows */
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(99, 102, 241, 0.06) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(6, 182, 212, 0.05) 0%, transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(244, 63, 94, 0.04) 0%, transparent 35%);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 40px;
            border-radius: 28px;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5);
        }

        h1, h2 {
            background: linear-gradient(135deg, #06b6d4 0%, #6366f1 50%, #f43f5e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            margin-top: 0;
        }

        p {
            margin-bottom: 20px;
            color: #94a3b8;
        }

        .contact-info {
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 30px;
        }

        .contact-info p {
            margin: 5px 0;
            color: #e2e8f0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #e2e8f0;
            font-size: 14px;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px 24px;
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 9999px; /* Pill shaped inputs */
            background: rgba(255, 255, 255, 0.03);
            color: #fff;
            outline: none;
            font-family: inherit;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-group textarea {
            border-radius: 20px; /* Better for textareas */
        }

        .form-group input:focus, .form-group textarea:focus {
            border-color: rgba(99, 102, 241, 0.5);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.15);
        }

        button {
            background: linear-gradient(135deg, #6366f1, #06b6d4);
            color: #fff;
            padding: 14px 20px;
            border: none;
            border-radius: 9999px; /* Pill shaped button */
            cursor: pointer;
            font-weight: 700;
            width: 100%;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.2);
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 10px 25px rgba(6, 182, 212, 0.4),
                0 0 15px rgba(99, 102, 241, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Contact Us</h1>
        <p>If you have any questions or concerns, feel free to reach out to us.</p>

        <div class="contact-info">
            <p><strong>Support Email:</strong> support@socialfuse.ai</p>
            <p><strong>Founder:</strong> Devesh K.</p>
        </div>

        <h2>Send us a message</h2>
        <form action="/contact/" method="POST">
            <!-- Ensure CSRF token is handled if integrated nicely, but for static/dummy we leave it -->
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" required></textarea>
            </div>
            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
